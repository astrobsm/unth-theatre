<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <title>ORM — UNTH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-user-select: none;
      user-select: none;
    }
    img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: .5rem; }
    p { color: #c7d2fe; font-size: .95rem; line-height: 1.5; max-width: 320px; }
    .spinner {
      margin-top: 2rem;
      width: 42px; height: 42px;
      border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <img src="./icon-512.png" alt="ORM" onerror="this.style.display='none'" />
  <h1>Operative Resource Manager</h1>
  <p>University of Nigeria Teaching Hospital, Ituku&nbsp;Ozalla</p>
  <div class="spinner" aria-hidden="true"></div>
</body>
</html>

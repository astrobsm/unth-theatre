name: Build native apps

# Builds the desktop installers (Windows / macOS / Linux) and the Android APK
# whenever a GitHub Release is published, and also on demand. Artifacts are
# uploaded to the workflow run and — for releases — attached to the release.
#
# The wrappers just load the live web app, so these binaries rarely need
# rebuilding (only when the shell/config changes). The web app/PWA itself keeps
# deploying via Vercel as usual.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Desktop installers — one job per OS (electron-builder builds for its host OS)
  # ---------------------------------------------------------------------------
  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
          - os: ubuntu-latest
            script: dist:linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Set desktop version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: desktop
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "Setting desktop version to $VER"
          npm version "$VER" --no-git-tag-version --allow-same-version

      - name: Build installer
        working-directory: desktop
        env:
          # Skip macOS code-signing (no certificate on CI). Produces an unsigned
          # build suitable for internal distribution.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Lets electron-builder publish installers + update metadata
          # (latest*.yml) to the GitHub release so the app can auto-update.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.script }} -- --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.AppImage
            desktop/release/*.deb
          if-no-files-found: warn

      # Desktop installers AND the auto-update metadata (latest*.yml) are
      # published to the GitHub release by electron-builder itself (see the
      # `--publish` flag above), so no separate attach step is needed here.

  # ---------------------------------------------------------------------------
  # Android APK (debug — installable directly; enable signing for Play Store)
  # ---------------------------------------------------------------------------
  android:
    name: Android APK / AAB
    runs-on: ubuntu-latest
    env:
      # True only when the release-signing keystore secrets are configured.
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install project deps
        run: npm install

      - name: Generate Android project (Capacitor)
        run: |
          npx cap add android || echo "android project already exists"
          npx cap sync android

      - name: Set Android version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # versionCode must be a monotonically increasing integer: MMmmpp.
          CODE=$(echo "$VER" | awk -F. '{printf "%d%02d%02d", $1, $2, ($3==""?0:$3)}')
          echo "Setting Android versionName=$VER versionCode=$CODE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VER\"/" android/app/build.gradle
          sed -i "s/versionCode [0-9][0-9]*/versionCode $CODE/" android/app/build.gradle

      - name: Generate app launcher icons
        run: |
          npx capacitor-assets generate --android \
            --iconBackgroundColor '#ffffff' \
            --iconBackgroundColorDark '#1e40af' \
            --splashBackgroundColor '#1e40af' || echo "icon generation skipped"

      # --- Firebase / FCM push -------------------------------------------------
      # Uses the committed firebase/google-services.json when present (safe for
      # VCS — its API key is app-restricted and ships inside every APK), else
      # falls back to a base64 secret. Self-skips when neither is available.
      - name: Configure Firebase (push notifications)
        run: |
          if [ -f firebase/google-services.json ]; then
            cp firebase/google-services.json android/app/google-services.json
            echo "Using committed firebase/google-services.json"
          elif [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
            echo "Using google-services.json from secret"
          else
            echo "No Firebase config found — skipping push setup."
            exit 0
          fi
          # Add the Google Services Gradle plugin classpath (project build.gradle).
          if ! grep -q "com.google.gms:google-services" android/build.gradle; then
            sed -i "/com.android.tools.build:gradle/a\        classpath 'com.google.gms:google-services:4.4.2'" android/build.gradle
          fi
          # Apply the plugin in the app module (must be after the Android plugin).
          if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
            echo "" >> android/app/build.gradle
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          fi
          echo "Firebase configured for the Android build."

      # --- Debug APK (always) — quick internal installs ------------------------
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Collect debug APK
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist-apk/ORM-UNTH-debug-${{ github.event.release.tag_name || github.ref_name }}.apk"

      # --- Signed release AAB + APK (only when keystore secrets exist) ---------
      - name: Configure release signing
        if: env.HAS_KEYSTORE == 'true'
        run: |
          # Decode the keystore into the app module.
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          # Append an additive `android {}` block that wires the release signing
          # config using env vars (Android Gradle merges multiple android blocks).
          cat >> android/app/build.gradle <<'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

      - name: Build signed release AAB + APK
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Collect signed release artifacts
        if: env.HAS_KEYSTORE == 'true'
        run: |
          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          cp android/app/build/outputs/bundle/release/app-release.aab "dist-apk/ORM-UNTH-$TAG.aab"
          cp android/app/build/outputs/apk/release/app-release.apk "dist-apk/ORM-UNTH-$TAG.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist-apk/*
          if-no-files-found: error

      - name: Attach Android builds to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-apk/*

  # ---------------------------------------------------------------------------
  # iOS app — simulator build always; signed IPA when Apple signing secrets exist
  # ---------------------------------------------------------------------------
  ios:
    name: iOS App / IPA
    runs-on: macos-latest
    env:
      HAS_IOS_SIGNING: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' && secrets.IOS_TEAM_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project deps
        run: npm install

      - name: Generate iOS project (Capacitor)
        run: |
          npx cap add ios || echo "ios project already exists"
          npx cap sync ios

      - name: Generate iOS app icons
        run: |
          npx capacitor-assets generate --ios \
            --iconBackgroundColor '#ffffff' \
            --iconBackgroundColorDark '#1e40af' \
            --splashBackgroundColor '#1e40af' || echo "icon generation skipped"

      - name: Set iOS version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          BUILD=$(echo "$VER" | awk -F. '{printf "%d%02d%02d", $1, $2, ($3==""?0:$3)}')
          echo "Setting iOS CFBundleShortVersionString=$VER CFBundleVersion=$BUILD"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/App/App/Info.plist

      - name: Build unsigned simulator app
        run: |
          set -e
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build-ios/simulator \
            CODE_SIGNING_ALLOWED=NO \
            build
          mkdir -p dist-ios
          ditto -c -k --sequesterRsrc --keepParent \
            build-ios/simulator/Build/Products/Debug-iphonesimulator/App.app \
            "dist-ios/ORM-UNTH-iOS-simulator-${{ github.event.release.tag_name || github.ref_name }}.zip"

      - name: Configure Apple signing
        if: env.HAS_IOS_SIGNING == 'true'
        shell: bash
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/ios_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/ios_profile.mobileprovision"
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/ios_profile.plist"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/ios_profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/ios_profile.plist")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "IOS_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Build signed iOS IPA
        if: env.HAS_IOS_SIGNING == 'true'
        shell: bash
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -e
          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build-ios/ORM-UNTH.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            archive
          cat > build-ios/export-options.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ng.edu.unth.orm</key>
              <string>$IOS_PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build-ios/ORM-UNTH.xcarchive \
            -exportOptionsPlist build-ios/export-options.plist \
            -exportPath dist-ios
          mv dist-ios/*.ipa "dist-ios/ORM-UNTH-$TAG.ipa"

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist-ios/*
          if-no-files-found: error

      - name: Attach iOS builds to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-ios/*

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORM — UNTH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      user-select: none;
    }
    img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: .5rem; }
    p { color: #c7d2fe; font-size: .95rem; line-height: 1.5; max-width: 360px; }
    .spinner {
      margin-top: 2rem; width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .offline { display: none; }
    .btn {
      margin-top: 1.75rem; padding: .75rem 2rem;
      background: #fff; color: #1e40af; border: none; border-radius: .6rem;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .btn:hover { opacity: .9; }
    :target#offline ~ .loading, body.show-offline .loading { display: none; }
  </style>
</head>
<body>
  <img src="build/icon.png" alt="ORM logo" onerror="this.style.display='none'" />
  <div class="loading">
    <h1>Operative Resource Manager</h1>
    <p>UNTH Ituku Ozalla — connecting to the theatre management system…</p>
    <div class="spinner"></div>
  </div>
  <div class="offline" id="offlineBlock">
    <h1>You&rsquo;re offline</h1>
    <p>The desktop app couldn&rsquo;t reach the server. Check your internet connection and try again.</p>
    <button class="btn" onclick="location.reload()">Retry</button>
  </div>
  <script>
    // Show the offline block when loaded with #offline (set by the shell on
    // a failed load), otherwise show the connecting spinner.
    if (location.hash === '#offline') {
      document.querySelector('.loading').style.display = 'none';
      document.getElementById('offlineBlock').style.display = 'block';
    }
    // Auto-retry the live app when connectivity returns.
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>

name: Build native apps

# Builds the desktop installers (Windows / macOS / Linux) and the Android APK
# whenever a GitHub Release is published, and also on demand. Artifacts are
# uploaded to the workflow run and — for releases — attached to the release.
#
# The wrappers just load the live web app, so these binaries rarely need
# rebuilding (only when the shell/config changes). The web app/PWA itself keeps
# deploying via Vercel as usual.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Desktop installers — one job per OS (electron-builder builds for its host OS)
  # ---------------------------------------------------------------------------
  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
          - os: ubuntu-latest
            script: dist:linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build installer
        working-directory: desktop
        env:
          # Skip macOS code-signing (no certificate on CI). Produces an unsigned
          # build suitable for internal distribution.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.script }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.AppImage
            desktop/release/*.deb
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.AppImage
            desktop/release/*.deb

  # ---------------------------------------------------------------------------
  # Android APK (debug — installable directly; enable signing for Play Store)
  # ---------------------------------------------------------------------------
  android:
    name: Android APK / AAB
    runs-on: ubuntu-latest
    env:
      # True only when the release-signing keystore secrets are configured.
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install project deps
        run: npm install

      - name: Generate Android project (Capacitor)
        run: |
          npx cap add android || echo "android project already exists"
          npx cap sync android

      # --- Debug APK (always) — quick internal installs ------------------------
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Collect debug APK
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist-apk/ORM-UNTH-debug-${{ github.event.release.tag_name || github.ref_name }}.apk"

      # --- Signed release AAB + APK (only when keystore secrets exist) ---------
      - name: Configure release signing
        if: env.HAS_KEYSTORE == 'true'
        run: |
          # Decode the keystore into the app module.
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          # Append an additive `android {}` block that wires the release signing
          # config using env vars (Android Gradle merges multiple android blocks).
          cat >> android/app/build.gradle <<'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

      - name: Build signed release AAB + APK
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Collect signed release artifacts
        if: env.HAS_KEYSTORE == 'true'
        run: |
          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          cp android/app/build/outputs/bundle/release/app-release.aab "dist-apk/ORM-UNTH-$TAG.aab"
          cp android/app/build/outputs/apk/release/app-release.apk "dist-apk/ORM-UNTH-$TAG.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist-apk/*
          if-no-files-found: error

      - name: Attach Android builds to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-apk/*
